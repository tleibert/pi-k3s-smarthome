---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zwave
  namespace: default
spec:
  hostnames:
    - "zwave.trevorleibert.com"
  parentRefs:
    - name: internal
      sectionName: websecure
  rules:
    - backendRefs:
        - name: zwave
          port: 8091
      matches:
        - path:
            type: PathPrefix
            value: /
