apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns
  namespace: cert-manager
spec:
  interval: 1h
  chart:
    spec:
      chart: external-dns
      version: "1.14.5"
      sourceRef:
        kind: HelmRepository
        name: kubernetes-sigs
        namespace: flux-system
      interval: 1h
  values:
    provider:
      name: cloudflare
    extraEnv:
      - name: CF_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: api-token
    sources:
      - gateway-httproute
    domainFilters:
      - trevorleibert.com
    txtOwnerId: pi-k3s
    txtPrefix: k8s.
    policy: sync
