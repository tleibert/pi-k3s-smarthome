apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: home-tls
  namespace: default
spec:
  secretName: home-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: dashy.trevorleibert.com
  dnsNames:
    - dashy.trevorleibert.com
    - glances.trevorleibert.com
    - ha.trevorleibert.com
    - zwave.trevorleibert.com
