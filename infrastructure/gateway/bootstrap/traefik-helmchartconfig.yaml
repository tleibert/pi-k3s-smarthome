---
# This manifest enables the Gateway API provider in K3s's built-in Traefik.
# Apply once manually or place in /var/lib/rancher/k3s/server/manifests/
# for persistence across node reboots.
#
# After applying, Traefik will restart with the new provider and begin
# watching Gateway + HTTPRoute resources alongside existing Ingress resources.
---
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    providers:
      kubernetesGateway:
        enabled: true
      kubernetesIngress:
        enabled: true
    experimental:
      kubernetesGateway:
        enabled: true
