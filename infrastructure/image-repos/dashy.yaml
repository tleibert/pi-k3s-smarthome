apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: dashy
  namespace: flux-system
spec:
  image: lissy93/dashy
  interval: 2h # Checks every 2 hours to avoid Docker Hub limits
---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: dashy
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: dashy
  filterTags:
    pattern: '^(\d+)\.(\d+)\.(\d+)$'
  policy:
    semver:
      range: ">=4.1.0"
