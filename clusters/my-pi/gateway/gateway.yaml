---
# K3s-specific: port 8000 is K3s's "web" entrypoint (K3s runs Traefik as non-root).
# On a standard cluster, this would be port 80.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: internal
  namespace: default
spec:
  gatewayClassName: traefik
  listeners:
    - name: web
      port: 8000
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same
